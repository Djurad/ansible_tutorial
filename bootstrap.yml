
- hosts: all
  become: true
  tasks:

    - name: create simone user
      tags: always
      user:
        name: simone
        groups: root

    - name: add ssh key for simone
      tags: always
      authorized_key:
         user: simone
         key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK0AyxmjzxsvjFRaMW5xIzz4LFH899Dbs5NxLYIYo3wg ansible"

    - name: add sudoers file for simone
      tags: always
      copy:
        src: sudoers_simone
        dest: /etc/sudoers.d/simone
        owner: root
        group: root
        mode: 0440

  
